<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>syncup-workspace</title>
    <script>
      (function () {
        const savedTheme = localStorage.getItem('syncup_darkMode');
        let dark = false;
        if (savedTheme !== null) {
          try { dark = JSON.parse(savedTheme); } catch { dark = savedTheme === 'true'; }
        } else {
          dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
